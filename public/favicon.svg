<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#141414"/>
  <!-- outer ring: primary cycle (crimson, ~280° sweep) -->
  <circle cx="32" cy="32" r="20" fill="none"
          stroke="#E10020" stroke-width="6"
          stroke-linecap="round"
          stroke-dasharray="98 28"
          transform="rotate(-90 32 32)"/>
  <!-- inner ring: compare cycle (lighter, ~280° sweep, rotated) -->
  <circle cx="32" cy="32" r="10" fill="none"
          stroke="#ffffff" stroke-width="4"
          stroke-linecap="round"
          stroke-dasharray="48 15"
          transform="rotate(45 32 32)"
          opacity="0.9"/>
</svg>
